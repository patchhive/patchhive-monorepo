services:
  backend:
    image: "${PATCHHIVE_MERGE_KEEPER_BACKEND_IMAGE:-ghcr.io/patchhive/mergekeeper-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8050:8000"
    volumes:
      - ./data:/data
    environment:
      - MERGE_KEEPER_DB_PATH=/data/merge-keeper.db
      - MERGE_KEEPER_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_MERGE_KEEPER_FRONTEND_IMAGE:-ghcr.io/patchhive/mergekeeper-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5178:8080"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-v2:
    image: "${PATCHHIVE_MERGE_KEEPER_FRONTEND_V2_IMAGE:-ghcr.io/patchhive/mergekeeper-frontend-v2}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend-v2
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5197:8080"
    depends_on:
      - backend
    restart: unless-stopped
