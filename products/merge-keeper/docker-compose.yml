services:
  backend:
    build: ./backend
    ports:
      - "8050:8000"
    volumes:
      - ./data:/data
    environment:
      - MERGE_KEEPER_DB_PATH=/data/merge-keeper.db
      - MERGE_KEEPER_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5178:8080"
    depends_on:
      - backend
    restart: unless-stopped
