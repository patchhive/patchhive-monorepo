services:
  backend:
    image: "${PATCHHIVE_VULN_TRIAGE_BACKEND_IMAGE:-ghcr.io/patchhive/vulntriage-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8110:8000"
    volumes:
      - ./data:/data
    environment:
      - VULN_TRIAGE_DB_PATH=/data/vuln-triage.db
      - VULN_TRIAGE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_VULN_TRIAGE_FRONTEND_IMAGE:-ghcr.io/patchhive/vulntriage-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5181:8080"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-v2:
    image: "${PATCHHIVE_VULN_TRIAGE_FRONTEND_V2_IMAGE:-patchhive/vulntriage-frontend-v2}:${PATCHHIVE_IMAGE_TAG:-local}"
    build:
      context: ../..
      dockerfile: products/vuln-triage/frontend-v2/Dockerfile
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5200:8080"
    depends_on:
      - backend
    restart: unless-stopped
