services:
  backend:
    image: "${PATCHHIVE_TRUST_GATE_BACKEND_IMAGE:-ghcr.io/patchhive/trustgate-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8020:8000"
    volumes:
      - ./data:/data
    environment:
      - TRUST_DB_PATH=/data/trust-gate.db
      - TRUSTGATE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_TRUST_GATE_FRONTEND_IMAGE:-ghcr.io/patchhive/trustgate-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5175:8080"
    depends_on:
      - backend
    restart: unless-stopped
