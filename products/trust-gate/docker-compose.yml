services:
  backend:
    build: ./backend
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8020:8000"
    volumes:
      - ./data:/data
    environment:
      - TRUST_DB_PATH=/data/trust-gate.db
      - TRUSTGATE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5175:8080"
    depends_on:
      - backend
    restart: unless-stopped
