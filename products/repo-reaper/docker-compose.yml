services:
  backend:
    image: "${PATCHHIVE_REPO_REAPER_BACKEND_IMAGE:-ghcr.io/patchhive/reporeaper-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - REAPER_DB_PATH=/data/repo-reaper.db
      - REAPER_WORK_DIR=/tmp/repo-reaper
      - REAPER_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_REPO_REAPER_FRONTEND_IMAGE:-ghcr.io/patchhive/reporeaper-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5173:8080"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-v2:
    image: "${PATCHHIVE_REPO_REAPER_FRONTEND_V2_IMAGE:-ghcr.io/patchhive/reporeaper-frontend-v2}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend-v2
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5195:8080"
    depends_on:
      - backend
    restart: unless-stopped
