services:
  backend:
    image: "${PATCHHIVE_FLAKE_STING_BACKEND_IMAGE:-ghcr.io/patchhive/flakesting-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8060:8000"
    volumes:
      - ./data:/data
    environment:
      - FLAKE_STING_DB_PATH=/data/flake-sting.db
      - FLAKE_STING_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_FLAKE_STING_FRONTEND_IMAGE:-ghcr.io/patchhive/flakesting-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5179:8080"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-v2:
    image: "${PATCHHIVE_FLAKE_STING_FRONTEND_V2_IMAGE:-ghcr.io/patchhive/flakesting-frontend-v2}:${PATCHHIVE_IMAGE_TAG:-main}"
    build:
      context: ../..
      dockerfile: products/flake-sting/frontend-v2/Dockerfile
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5198:8080"
    depends_on:
      - backend
    restart: unless-stopped
