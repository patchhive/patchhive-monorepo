services:
  backend:
    image: "${PATCHHIVE_DEP_TRIAGE_BACKEND_IMAGE:-ghcr.io/patchhive/deptriage-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8070:8000"
    volumes:
      - ./data:/data
    environment:
      - DEP_TRIAGE_DB_PATH=/data/dep-triage.db
      - DEP_TRIAGE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_DEP_TRIAGE_FRONTEND_V2_IMAGE:-patchhive/deptriage-frontend-v2}:${PATCHHIVE_IMAGE_TAG:-local}"
    build:
      context: ../..
      dockerfile: products/dep-triage/frontend-v2/Dockerfile
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5180:8080"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-legacy:
    profiles:
      - legacy-ui
    image: "${PATCHHIVE_DEP_TRIAGE_FRONTEND_LEGACY_IMAGE:-ghcr.io/patchhive/deptriage-frontend-legacy}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend-legacy
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5203:8080"
    depends_on:
      - backend
    restart: unless-stopped
