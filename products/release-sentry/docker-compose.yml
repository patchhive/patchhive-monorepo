services:
  backend:
    image: "${PATCHHIVE_RELEASE_SENTRY_BACKEND_IMAGE:-ghcr.io/patchhive/release-sentry-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8120:8000"
    volumes:
      - ./data:/data
    environment:
      - RELEASE_SENTRY_DB_PATH=/data/release-sentry.db
      - RELEASE_SENTRY_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_RELEASE_SENTRY_FRONTEND_IMAGE:-ghcr.io/patchhive/release-sentry-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build:
      context: ../..
      dockerfile: products/release-sentry/frontend/Dockerfile
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5184:8080"
    depends_on:
      - backend
    restart: unless-stopped
