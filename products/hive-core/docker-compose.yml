services:
  backend:
    build: ./backend
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8100:8000"
    volumes:
      - ./data:/data
    environment:
      - HIVE_CORE_DB_PATH=/data/hive-core.db
      - HIVE_CORE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5183:8080"
    depends_on:
      - backend
    restart: unless-stopped
