services:
  backend:
    image: "${PATCHHIVE_HIVE_CORE_BACKEND_IMAGE:-ghcr.io/patchhive/hivecore-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8100:8000"
    volumes:
      - ./data:/data
    environment:
      - HIVE_CORE_DB_PATH=/data/hive-core.db
      - HIVE_CORE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_HIVE_CORE_FRONTEND_IMAGE:-ghcr.io/patchhive/hivecore-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5183:8080"
    depends_on:
      - backend
    restart: unless-stopped
