services:
  backend:
    image: "${PATCHHIVE_REFACTOR_SCOUT_BACKEND_IMAGE:-ghcr.io/patchhive/refactorscout-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8090:8000"
    volumes:
      - ./data:/data
    environment:
      - REFACTOR_SCOUT_DB_PATH=/data/refactor-scout.db
      - REFACTOR_SCOUT_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_REFACTOR_SCOUT_FRONTEND_IMAGE:-ghcr.io/patchhive/refactorscout-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5182:8080"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-v2:
    image: "${PATCHHIVE_REFACTOR_SCOUT_FRONTEND_V2_IMAGE:-patchhive/refactorscout-frontend-v2}:${PATCHHIVE_IMAGE_TAG:-local}"
    build: ./frontend-v2
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5201:8080"
    depends_on:
      - backend
    restart: unless-stopped
