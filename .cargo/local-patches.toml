# Opt-in monorepo-local overrides so PatchHive products can iterate on shared
# crates without publishing every edit first.
#
# Usage:
#   cargo --config .cargo/local-patches.toml check --manifest-path products/hive-core/backend/Cargo.toml
#
# The default `.cargo/config.toml` intentionally does not load these patches so
# normal product `cargo run` / `cargo check` commands do not emit Cargo's
# "patch was not used" warnings for crates outside that product's dependency graph.
[patch."https://github.com/patchhive/patchhive-product-core.git"]
patchhive-product-core = { path = "crates/patchhive-product-core" }

[patch."https://github.com/patchhive/patchhive-github-pr.git"]
patchhive-github-pr = { path = "crates/patchhive-github-pr" }

[patch."https://github.com/patchhive/patchhive-github-data.git"]
patchhive-github-data = { path = "crates/patchhive-github-data" }

[patch."https://github.com/patchhive/patchhive-github-security.git"]
patchhive-github-security = { path = "crates/patchhive-github-security" }
