key = "vuln-triage"
code = "VT"
name = "VulnTriage"
role = "security finding triage"
module_path = "crate::products::vuln_triage"
route_prefix = "/api/products/vuln-triage"
migration_stage = "not-started"

[safety]
read_only = true
credential_scopes = ["github:security_events:read", "github:dependabot:read"]
evidence_required = ["security alert snapshot", "severity inputs", "reachability hints"]

[gateway]
default_url = "http://127.0.0.1:8110"
env_var = "VULN_TRIAGE_GATEWAY_URL"

[health]
endpoint = "/api/products/vuln-triage/health"
timeout_ms = 2000
healthy_status = 200

[[capabilities]]
id = "code-scanning"
label = "Code scanning"
description = "Read GitHub code scanning alerts."

[[capabilities]]
id = "dependabot-alerts"
label = "Dependabot alerts"
description = "Read dependency vulnerability alerts."

[[capabilities]]
id = "read-only"
label = "Read-only"
description = "Does not patch or dismiss findings."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/health"
description = "Report VulnTriage runtime health."

[[routes]]
method = "POST"
path = "/api/products/vuln-triage/auth/login"
description = "Validate a VulnTriage API key."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/auth/status"
description = "Read VulnTriage auth bootstrap state."

[[routes]]
method = "POST"
path = "/api/products/vuln-triage/auth/generate-key"
description = "Generate the first local VulnTriage API key."

[[routes]]
method = "POST"
path = "/api/products/vuln-triage/auth/generate-service-token"
description = "Generate a VulnTriage service token for HiveCore."

[[routes]]
method = "POST"
path = "/api/products/vuln-triage/auth/rotate-service-token"
description = "Rotate the VulnTriage service token."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/startup/checks"
description = "Read VulnTriage startup checks."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/capabilities"
description = "Read VulnTriage product capabilities."

[[routes]]
method = "POST"
path = "/api/products/vuln-triage/scan/github/findings"
description = "Rank GitHub code scanning and dependency vulnerability findings for a repo."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/runs"
description = "List VulnTriage runs."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/runs/:id"
description = "Read a VulnTriage scan detail."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/overview"
description = "Read VulnTriage overview metrics and recent scans."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/history"
description = "List VulnTriage scan history."

[[routes]]
method = "GET"
path = "/api/products/vuln-triage/history/:id"
description = "Read a VulnTriage scan detail."
