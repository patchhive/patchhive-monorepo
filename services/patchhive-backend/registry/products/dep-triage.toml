key = "dep-triage"
code = "DT"
name = "DepTriage"
role = "dependency update triage"
module_path = "crate::products::dep_triage"
route_prefix = "/api/products/dep-triage"
migration_stage = "not-started"

[safety]
read_only = true
credential_scopes = ["github:pull_requests:read", "github:dependabot:read"]
evidence_required = ["dependency PRs", "alert sample", "scoring inputs"]

[gateway]
default_url = "http://127.0.0.1:8070"
env_var = "DEP_TRIAGE_GATEWAY_URL"

[health]
endpoint = "/api/products/dep-triage/health"
timeout_ms = 2000
healthy_status = 200

[[capabilities]]
id = "dependency-prs"
label = "Dependency PRs"
description = "Read dependency update pull requests."

[[capabilities]]
id = "dependabot-alerts"
label = "Dependabot alerts"
description = "Read dependency security alert pressure."

[[capabilities]]
id = "read-only"
label = "Read-only"
description = "Does not merge or rewrite dependencies."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/health"
description = "Report DepTriage runtime health."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/auth/status"
description = "Read DepTriage auth bootstrap state."

[[routes]]
method = "POST"
path = "/api/products/dep-triage/auth/login"
description = "Validate a DepTriage API key."

[[routes]]
method = "POST"
path = "/api/products/dep-triage/auth/generate-key"
description = "Generate the first local DepTriage API key."

[[routes]]
method = "POST"
path = "/api/products/dep-triage/auth/generate-service-token"
description = "Generate a DepTriage service token for HiveCore."

[[routes]]
method = "POST"
path = "/api/products/dep-triage/auth/rotate-service-token"
description = "Rotate the DepTriage service token."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/startup/checks"
description = "Read DepTriage startup checks."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/capabilities"
description = "Read DepTriage product capabilities."

[[routes]]
method = "POST"
path = "/api/products/dep-triage/scan/github/dependencies"
description = "Rank dependency PR and alert pressure for a repo."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/runs"
description = "List DepTriage runs."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/runs/:id"
description = "Read a DepTriage scan detail."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/overview"
description = "Read DepTriage overview metrics and recent scans."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/history"
description = "List DepTriage scan history."

[[routes]]
method = "GET"
path = "/api/products/dep-triage/history/:id"
description = "Read a DepTriage scan detail."
